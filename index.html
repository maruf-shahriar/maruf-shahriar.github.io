<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="styles.css" />
        <link
            href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;500&amp;display=swap"
            rel="stylesheet"
        />
        <title>Maruf's Bio</title>
        <script
            src="https://kit.fontawesome.com/841811b8a8.js"
            crossorigin="anonymous"
        ></script>
    </head>
    <body>
        <section class="container">
            <section class="rightInfo">
                <p id="header">
                    Hi. I'm <span style="font-weight: 500">Maruf</span>
                </p>
                <div class="aboutInfo">
                    <p>
                        CSE student at<br />
                        <a href="https://www.ewubd.edu/" target="_blank">
                            <span style="font-weight: 500"
                                >East West University</span
                            ></a
                        >.
                    </p>
                </div>
                <div class="links">
                    <a href="assets/Maruf Shahriar_CV.pdf" target="_blank"
                        ><button>View Resume</button></a
                    >
                    <div class="icons">
                        <a
                            href="https://www.linkedin.com/in/maruf-shahriar-0054101b2/"
                            target="_blank"
                            ><i
                                class="fab fa-linkedin fa-3x"
                                aria-hidden="true"
                            ></i
                        ></a>
                        <a
                            href="https://github.com/maruf-shahriar"
                            target="_blank"
                            ><i
                                class="fab fa-github fa-3x"
                                aria-hidden="true"
                            ></i
                        ></a>

                        <a href="mailto:mrfshahriar@gmail.com" id="emailLink"
                            ><i
                                class="fas fa-envelope fa-3x"
                                aria-hidden="true"
                            ></i
                        ></a>
                    </div>
                </div>
            </section>

            <section class="leftImage">
                <img id="image" src="assets/pic.jpg" alt="No Photo Available" />
            </section>
        </section>
        <div class="notification" id="copyNotification" style="display: none">
            Email address copied to clipboard!
        </div>
        <script>
            document
                .getElementById("emailLink")
                .addEventListener("click", function (event) {
                    event.preventDefault(); // Prevent the default mailto link behavior
                    const email = this.getAttribute("href").replace(
                        "mailto:",
                        ""
                    ); // Extract the email address
                    copyToClipboard(email); // Call the copyToClipboard function to copy the email address
                });

            // Function to copy text to the clipboard
            function copyToClipboard(text) {
                const textarea = document.createElement("textarea");
                textarea.value = text;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand("copy");
                document.body.removeChild(textarea);

                // Show the notification message
                const copyNotification =
                    document.getElementById("copyNotification");
                copyNotification.style.display = "block";

                // Hide the notification after a brief delay (e.g., 2 seconds)
                setTimeout(function () {
                    copyNotification.style.display = "none";
                }, 2000); // 2000 milliseconds = 2 seconds
            }
        </script>
    </body>
</html>
